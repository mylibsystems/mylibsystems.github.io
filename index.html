<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyLib Systems | Under Construction</title>
  <meta name="description" content="MyLib Systems website is under construction.">
  <style>
    :root {
      --bg-1: #0b1220;
      --bg-2: #1a2e4a;
      --accent: #18c29c;
      --text: #e9f0fb;
      --muted: #9eb1cc;
      --card: rgba(8, 18, 34, 0.68);
      --ring: rgba(24, 194, 156, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      font-family: "Avenir Next", "Segoe UI", "Helvetica Neue", Helvetica, Arial, sans-serif;
      color: var(--text);
    }

    body {
      background:
        radial-gradient(1100px 700px at 15% 10%, #27466b 0%, transparent 60%),
        radial-gradient(900px 600px at 85% 90%, #163b49 0%, transparent 65%),
        linear-gradient(150deg, var(--bg-1), var(--bg-2));
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .panel {
      width: min(760px, 100%);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 18px;
      padding: 28px;
      background: var(--card);
      backdrop-filter: blur(8px);
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.36);
      animation: reveal 700ms ease-out both;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 6px 12px;
      border: 1px solid rgba(24, 194, 156, 0.45);
      border-radius: 999px;
      color: var(--accent);
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: rgba(24, 194, 156, 0.08);
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 0 var(--ring);
      animation: pulse 2s infinite;
    }

    h1 {
      margin: 18px 0 10px;
      font-size: clamp(28px, 5vw, 44px);
      line-height: 1.1;
      letter-spacing: 0.01em;
    }

    p {
      margin: 0;
      font-size: clamp(16px, 2.4vw, 20px);
      color: var(--muted);
      max-width: 58ch;
      line-height: 1.6;
    }

    .brand {
      margin-top: 22px;
      font-size: 14px;
      color: #c4d3e8;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    @keyframes pulse {
      0% {
        box-shadow: 0 0 0 0 var(--ring);
      }
      70% {
        box-shadow: 0 0 0 12px rgba(24, 194, 156, 0);
      }
      100% {
        box-shadow: 0 0 0 0 rgba(24, 194, 156, 0);
      }
    }

    @keyframes reveal {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <main class="panel" aria-label="Under construction notice">
    <div class="badge">
      <span class="dot" aria-hidden="true"></span>
      Under Construction
    </div>
    <h1>Our new site is on the way.</h1>
    <p>
      MyLib Systems is preparing a new digital experience. We are currently building this website and will launch soon.
    </p>
    <div class="brand">MyLib Systems</div>
  </main>
</body>
</html>
